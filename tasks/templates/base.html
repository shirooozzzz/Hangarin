<!DOCTYPE html>
<html>
<head>

    <title>Task Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        body {
            overflow-x: hidden;
        }

        /* SIDEBAR */

        .sidebar {
            height: 100vh;
            background: #2f3542;
            color: white;
            transition: 0.3s;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 14px 20px;
            font-size: 16px;
        }

        .sidebar a:hover {
            background: #57606f;
        }

        .sidebar .active {
            background: #3742fa;
        }

        /* CONTENT */

        .content {
            padding: 30px;
        }

        /* COLLAPSE BUTTON */

        .toggle-btn {
            cursor: pointer;
            font-size: 22px;
        }

    </style>

</head>

<body>

<div class="container-fluid">

    <div class="row">

        <!-- SIDEBAR -->

        <div id="sidebar" class="col-md-2 sidebar">

            <h4 class="text-center mt-3 mb-4">
                Task Manager
            </h4>

            <a href="/" class="active">
                <i class="bi bi-speedometer2"></i>
                Dashboard
            </a>

            <a href="{% url 'task_list' %}">
                <i class="bi bi-list-task"></i>
                Tasks
            </a>

        </div>


        <!-- CONTENT AREA -->

        <div class="col-md-10">

            <!-- TOP BAR -->

            <div class="d-flex justify-content-between align-items-center border-bottom p-3">

                <span class="toggle-btn" onclick="toggleSidebar()">
                    <i class="bi bi-list"></i>
                </span>

                <h4 class="mb-0">
                    Dashboard
                </h4>

            </div>


            <div class="content">

                {% block content %}
                {% endblock %}

            </div>

        </div>

    </div>

</div>


<script>

function toggleSidebar() {

    let sidebar = document.getElementById("sidebar");

    if (sidebar.style.display === "none") {
        sidebar.style.display = "block";
    } else {
        sidebar.style.display = "none";
    }

}

</script>

</body>
</html>
