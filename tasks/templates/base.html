<!DOCTYPE html>
<html>

<head>

  <title>{% block title %}Hangarin{% endblock %}</title> 

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      overflow-x: hidden;
    }

    /* SIDEBAR */

    .sidebar {
      height: 100vh;
      background: #2f3542;
      color: white;
      transition: 0.3s;
    }

    .sidebar a {
      color: white;
      text-decoration: none;
      display: block;
      padding: 14px 20px;
      font-size: 16px;
    }

    .sidebar a:hover {
      background: #57606f;
    }

    .sidebar .active {
      background: #3742fa;
    }

    /* CONTENT */

    .content {
      padding: 30px;
    }

    /* COLLAPSE BUTTON */

    .toggle-btn {
      cursor: pointer;
      font-size: 22px;
    }
  </style>

</head>

<body>

  <div class="container-fluid">

    <div class="row">

      <!-- SIDEBAR -->

      <div id="sidebar" class="col-md-2 sidebar">

        <h4 class="text-center mt-3 mb-4">
          Task Manager
        </h4>

        <a href="/">
          <i class="bi bi-speedometer2"></i>
          Dashboard
        </a>

        <a href="{% url 'task_list' %}">
          <i class="bi bi-list-task"></i>
          Tasks
        </a>

        <a href="{% url 'category_list' %}">
          <i class="bi bi-folder"></i>
          Categories
        </a>

        <a href="{% url 'priority_list' %}">
          <i class="bi bi-lightning"></i>
          Priorities
        </a>

        <a href="{% url 'note_list' %}">
          <i class="bi bi-journal-text"></i>
          Notes
        </a>

        <a href="{% url 'subtask_list' %}">
          <i class="bi bi-check2-square"></i>
          Subtasks
        </a>

      </div>

      <div class="col-md-10">

        <div class="d-flex justify-content-between align-items-center border-bottom p-3">

          <span class="toggle-btn" onclick="toggleSidebar()">
            <i class="bi bi-list"></i>
          </span>

          {% load socialaccount %}

          {% if user.is_authenticated %}

            <div class="d-flex align-items-center gap-3">

              {% if user.socialaccount_set.all.0 %}
                <img src="{{ user.socialaccount_set.all.0.extra_data.picture }}"
                  class="rounded-circle"
                  width="35" height="35">
              {% else %}
                <i class="bi bi-person-circle fs-4"></i>
              {% endif %}

              <span class="fw-semibold">
                {{ user.username }}
              </span>

              <a href="{% url 'account_logout' %}" class="btn btn-outline-danger btn-sm">
                Logout
              </a>

            </div>

          {% else %}

            <a href="{% url 'account_login' %}" class="btn btn-outline-primary">
              Login
            </a>

          {% endif %}

        </div>


        <div class="content">

          {% block content %}
          {% endblock %}

        </div>

      </div>

    </div>

  </div>


  <script>

    function toggleSidebar() {

      let sidebar = document.getElementById("sidebar");

      if (sidebar.style.display === "none") {
        sidebar.style.display = "block";
      } else {
        sidebar.style.display = "none";
      }

    }

  </script>

</body>

</html>
