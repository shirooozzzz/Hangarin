{% extends "base.html" %}

{% block content %}

<div class="d-flex justify-content-center">

    <div class="card shadow p-4 text-center" style="width:450px;">

        <h4 class="mb-3">
            Delete Note
        </h4>

        <p>
            Are you sure you want to delete this note?
        </p>

        <p class="text-muted">
            "{{ object.content|truncatechars:60 }}"
        </p>

        <form method="post">

            {% csrf_token %}

            <button class="btn btn-danger">
                Yes, Delete
            </button>

            <a class="btn btn-secondary"
               href="{% url 'note_list' %}">
               Cancel
            </a>

        </form>

    </div>

</div>

{% endblock %}
