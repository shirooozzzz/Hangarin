{% load socialaccount %}
<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow-lg p-4 border-0" style="width: 400px; border-radius: 15px;">

        <div class="text-center mb-4">
            <h3 class="fw-bold">Welcome Back</h3>
            <p class="text-muted">Login to your account</p>
        </div>

        <!-- Google Login -->
        <div class="d-grid mb-3">
            <a href="{% provider_login_url 'google' %}" class="btn btn-danger">
                🔴 Continue with Google
            </a>
        </div>

        <!-- GitHub Login -->
        <div class="d-grid mb-3">
            <a href="{% provider_login_url 'github' %}" class="btn btn-dark">
                ⚫ Continue with GitHub
            </a>
        </div>

        <hr>

        <!-- Default Django Login -->
        <form method="post" action="{% url 'account_login' %}">
            {% csrf_token %}

            <div class="mb-3">
                <input type="text" name="login" class="form-control" placeholder="Username or Email">
            </div>

            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Password">
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary">
                    Login
                </button>
            </div>
        </form>

    </div>

</div>

</body>
</html>
